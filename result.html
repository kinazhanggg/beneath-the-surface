<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Result</title>
    <link rel="stylesheet" href="result.css">
</head>
<body>
    <div class="result-container">
        <div class="emoji-box" id="resEmoji"></div>
        <h1 id="resName"></h1>
        <p class="tagline" id="resTagline"></p>
        <div class="desc-box" id="resDesc"></div>
        <div class="traits-box">
            <h3>Your Traits</h3>
            <div id="resTraits"></div>
        </div>
        <p class="extra-info" id="resSurface"></p>
        <p class="extra-info" id="resUnder"></p>
        <p class="match-info" id="resMatch"></p>
        <button class="back-btn" onclick="backHome()">Restart Test</button>
    </div>
    <script src="result.js"></script>
</body>
</html>
