<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }
        body {
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 10px #ccc;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 10px;
            cursor: pointer;
        }
        .toggle {
            text-align: center;
            margin-top: 15px;
            color: #007bff;
            cursor: pointer;
        }
        #register {
            display: none;
        }
    </style>
</head>
<body>

<div class="box">
    <div id="login">
        <h2>Login</h2>
        <input id="loginUser" type="text" placeholder="Username"><br>
        <input id="loginPwd" type="password" placeholder="Password"><br>
        <button onclick="login()">Login</button>
        <div class="toggle" onclick="switchToRegister()">Don't have an account? Register</div>
    </div>

    <div id="register">
        <h2>Register</h2>
        <input id="regUser" type="text" placeholder="Username"><br>
        <input id="regPwd" type="password" placeholder="Password"><br>
        <input id="regPwd2" type="password" placeholder="Confirm Password"><br>
        <button onclick="register()">Register</button>
        <div class="toggle" onclick="switchToLogin()">Back to Login</div>
    </div>
</div>

<script>
    function switchToRegister() {
        document.getElementById("login").style.display = "none";
        document.getElementById("register").style.display = "block";
    }
    function switchToLogin() {
        document.getElementById("register").style.display = "none";
        document.getElementById("login").style.display = "block";
    }

    function register() {
        let user = document.getElementById("regUser").value;
        let pwd = document.getElementById("regPwd").value;
        let pwd2 = document.getElementById("regPwd2").value;

        if (pwd != pwd2) {
            alert("Passwords do not match!");
            return;
        }
        localStorage.setItem("username", user);
        localStorage.setItem("password", pwd);
        alert("Registration success! Please login.");
        switchToLogin();
    }

    function login() {
        let user = document.getElementById("loginUser").value;
        let pwd = document.getElementById("loginPwd").value;

        let realUser = localStorage.getItem("username");
        let realPwd = localStorage.getItem("password");

        if (user == realUser && pwd == realPwd) {
            localStorage.setItem("isLogin", "yes");
            window.location.href = "quiz.html"; 
        } else {
            alert("Wrong username or password!");
        }
    }
</script>
</body>
</html>
